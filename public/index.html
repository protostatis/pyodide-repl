<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pyreplab notebook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e0e0e0; min-height: 100vh;
      background-image:
        radial-gradient(at 20% 0%, rgba(110, 64, 201, 0.08) 0%, transparent 45%),
        radial-gradient(at 80% 0%, rgba(88, 166, 255, 0.06) 0%, transparent 50%);
    }

    /* --- Keyframes --- */
    @keyframes cellEnter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes outputFade {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.8); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes runningGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(210, 153, 34, 0.55), 0 0 18px rgba(210, 153, 34, 0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(210, 153, 34, 0.85), 0 0 28px rgba(210, 153, 34, 0.32); }
    }
    @keyframes askGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(110, 64, 201, 0.6), 0 0 18px rgba(110, 64, 201, 0.18); }
      50%      { box-shadow: 0 0 0 1px rgba(176, 132, 255, 0.85), 0 0 28px rgba(176, 132, 255, 0.32); }
    }
    @keyframes caretBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes flashIn {
      0%   { background: rgba(88, 166, 255, 0.18); }
      100% { background: transparent; }
    }
    @keyframes dropPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.02); }
    }

    /* Header */
    header {
      padding: 10px 20px;
      background: rgba(22, 24, 34, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2d3e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .left { display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 15px; font-weight: 600; color: #c9d1d9; }
    header h1 span {
      background: linear-gradient(135deg, #58a6ff 0%, #d2a8ff 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; font-weight: 500;
    }
    #status {
      font-size: 11px; padding: 3px 9px 3px 7px; border-radius: 999px;
      font-family: monospace; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.2s, color 0.2s;
    }
    #status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; display: inline-block;
    }
    #status.idle { background: #0d3320; color: #3fb950; }
    #status.idle::before { animation: pulseDot 2.4s ease-in-out infinite; }
    #status.running { background: #3d2e00; color: #d29922; }
    #status.running::before { animation: pulseDot 1s ease-in-out infinite; }
    #status.loading { background: #0c2d6b; color: #58a6ff; }
    #status.loading::before { animation: pulseDot 1.2s ease-in-out infinite; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions button {
      padding: 5px 12px; font-size: 12px; background: #21262d;
      border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .header-actions button:hover { background: #30363d; border-color: #484f58; }
    .header-actions button:active { transform: scale(0.97); }

    /* Notebook */
    #notebook { max-width: 960px; margin: 0 auto; padding: 20px 20px 120px; }

    /* --- Landing / Data Picker --- */
    #landing { max-width: 960px; margin: 0 auto; padding: 48px 20px; animation: cellEnter 0.4s ease-out; }
    #landing h2 {
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #c9d1d9 0%, #58a6ff 60%, #d2a8ff 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #landing .subtitle { color: #6e7681; font-size: 14px; margin-bottom: 32px; }

    .provenance-panel {
      margin-bottom: 28px;
      padding: 18px 18px 16px;
      border: 1px solid #21262d;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(22, 24, 34, 0.95), rgba(18, 20, 28, 0.95));
      box-shadow: 0 12px 36px -24px rgba(88, 166, 255, 0.35);
    }
    .provenance-panel .eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: #8b949e; margin-bottom: 8px;
    }
    .provenance-panel .summary {
      color: #c9d1d9; font-size: 13px; line-height: 1.55; max-width: 860px;
      margin-bottom: 14px;
    }
    .provenance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .provenance-card {
      padding: 12px 12px 11px;
      border-radius: 10px;
      background: #161822;
      border: 1px solid #21262d;
    }
    .provenance-card .label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: #8b949e; margin-bottom: 4px;
    }
    .provenance-card .value {
      color: #e0e0e0; font-size: 13px; line-height: 1.45;
    }
    .provenance-card .muted {
      color: #8b949e;
    }

    .data-section { margin-bottom: 24px; animation: cellEnter 0.5s ease-out backwards; }
    .data-section.full-width { grid-column: 1 / -1; }
    .data-section:nth-child(2) { animation-delay: 0.05s; }
    .data-section:nth-child(3) { animation-delay: 0.10s; }
    .data-section:nth-child(4) { animation-delay: 0.15s; }
    .data-section:nth-child(5) { animation-delay: 0.20s; }
    .data-section:nth-child(6) { animation-delay: 0.25s; }
    .data-section h3 {
      font-size: 11px; font-weight: 600; color: #6e7681;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
    }
    .data-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
    }
    .data-card {
      padding: 14px; background: #161822;
      border: 1px solid #21262d; border-radius: 10px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s ease, border-color 0.15s, box-shadow 0.2s;
    }
    .data-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(110, 64, 201, 0.08));
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .data-card:hover {
      border-color: #58a6ff; transform: translateY(-2px);
      box-shadow: 0 8px 24px -8px rgba(88, 166, 255, 0.35);
    }
    .data-card:hover::before { opacity: 1; }
    .data-card:active { transform: translateY(-1px); }
    .data-card.loading-pending {
      border-color: #d29922;
      animation: runningGlow 1.6s ease-in-out infinite;
    }
    .data-card .card-title {
      font-size: 14px; font-weight: 600; color: #c9d1d9; margin-bottom: 2px;
      position: relative; z-index: 1;
    }
    .data-card .card-desc {
      font-size: 11px; color: #6e7681; line-height: 1.35;
      position: relative; z-index: 1;
    }

    /* Upload tile — same shape as data-card, dashed accent */
    .upload-card {
      padding: 14px; background: #161822;
      border: 1.5px dashed #30363d; border-radius: 10px;
      cursor: pointer; position: relative; overflow: hidden;
      display: flex; flex-direction: column; gap: 2px;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .upload-card:hover {
      border-color: #58a6ff; transform: translateY(-2px);
      box-shadow: 0 8px 24px -8px rgba(88, 166, 255, 0.35);
      background: #1a1f2e;
    }
    .upload-card .card-title {
      font-size: 14px; font-weight: 600; color: #c9d1d9; margin-bottom: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .upload-card .card-title::before {
      content: '+'; display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #d2a8ff);
      color: #0f1117; font-weight: 700; font-size: 13px; line-height: 1;
    }
    .upload-card .card-desc { font-size: 11px; color: #6e7681; line-height: 1.35; }
    .upload-card input[type="file"] { display: none; }

    /* Full-page drop overlay */
    #drop-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15, 17, 23, 0.85); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #drop-overlay.active { display: flex; animation: dropPulse 1.4s ease-in-out infinite; }
    #drop-overlay .drop-card {
      padding: 40px 60px; border: 2px dashed #58a6ff; border-radius: 16px;
      background: rgba(88, 166, 255, 0.08); text-align: center;
    }
    #drop-overlay .drop-card .drop-title {
      font-size: 22px; font-weight: 600; color: #c9d1d9; margin-bottom: 6px;
    }
    #drop-overlay .drop-card .drop-sub { font-size: 13px; color: #8b949e; }

    /* Cell */
    .cell {
      border: 1px solid #21262d; border-radius: 10px; margin-bottom: 12px;
      background: #161822; position: relative; overflow: hidden;
      animation: cellEnter 0.25s ease-out;
      transition: border-color 0.15s, box-shadow 0.2s, transform 0.15s;
    }
    .cell:hover { border-color: #30363d; }
    .cell.focused { border-color: #58a6ff; box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.25); }
    .cell.ask.focused { border-color: #6e40c9; box-shadow: 0 0 0 1px rgba(110, 64, 201, 0.25); }
    .cell.running { border-color: #d29922; animation: runningGlow 1.4s ease-in-out infinite, cellEnter 0.25s ease-out; }
    .cell.ask.running { border-color: #b084ff; animation: askGlow 1.4s ease-in-out infinite, cellEnter 0.25s ease-out; }

    /* Animated accent bar on left edge of running cells */
    .cell::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent;
      transition: background 0.2s; pointer-events: none;
    }
    .cell.running::before {
      background: linear-gradient(180deg,
        transparent 0%, #d29922 20%, #f0b432 50%, #d29922 80%, transparent 100%);
      background-size: 100% 200%;
      animation: shimmer 1.5s linear infinite;
    }
    .cell.ask.running::before {
      background: linear-gradient(180deg,
        transparent 0%, #6e40c9 20%, #b084ff 50%, #6e40c9 80%, transparent 100%);
      background-size: 100% 200%;
      animation: shimmer 1.5s linear infinite;
    }

    .cell-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 14px;
      border-bottom: 1px solid #21262d; font-size: 11px; color: #484f58;
      background: rgba(13, 17, 23, 0.4);
    }
    .cell-toolbar .cell-index { font-family: monospace; color: #484f58; min-width: 32px; }
    .cell-type-toggle {
      padding: 2px 10px; font-size: 11px; background: transparent;
      border: 1px solid #30363d; border-radius: 999px; color: #8b949e; cursor: pointer; font-family: monospace;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .cell-type-toggle:hover { color: #c9d1d9; border-color: #484f58; }
    .cell-type-toggle.ask { color: #d2a8ff; border-color: #6e40c9; background: rgba(110, 64, 201, 0.08); }
    .cell-toolbar .spacer { flex: 1; }
    .cell-toolbar button {
      padding: 2px 10px; font-size: 11px; background: transparent;
      border: 1px solid transparent; border-radius: 4px; color: #484f58; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .cell-toolbar button:hover { color: #c9d1d9; border-color: #30363d; }
    .cell-toolbar button:active { transform: scale(0.94); }
    .cell-toolbar .run-btn { color: #3fb950; }
    .cell-toolbar .run-btn:hover { color: #56d364; background: rgba(63, 185, 80, 0.1); }
    .cell-toolbar .delete-btn:hover { color: #f85149; background: rgba(248, 81, 73, 0.08); }

    .cell-input {
      width: 100%; padding: 12px 14px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px; line-height: 1.6; background: transparent;
      border: none; color: #e6edf3; resize: none; outline: none;
      min-height: 38px; overflow: hidden;
      transition: background 0.15s;
    }
    .cell.ask .cell-input { color: #e1c8ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    .cell-input::placeholder { color: #30363d; }
    .cell-input:focus { background: rgba(88, 166, 255, 0.03); }
    .cell.ask .cell-input:focus { background: rgba(110, 64, 201, 0.05); }

    .cell-output {
      border-top: 1px solid #21262d; padding: 12px 14px; font-family: monospace;
      font-size: 12px; line-height: 1.5; display: none;
    }
    .cell-output.has-output { display: block; animation: outputFade 0.25s ease-out; }
    .cell-output > * { animation: outputFade 0.25s ease-out; }
    .cell-output .stdout { color: #c9d1d9; white-space: pre-wrap; word-break: break-word; display: block; }
    .cell-output .stderr { color: #d29922; white-space: pre-wrap; display: block; }
    .cell-output .error { color: #f85149; white-space: pre-wrap; word-break: break-word; display: block; }
    .cell-output .result { color: #3fb950; white-space: pre-wrap; display: block; }
    .cell-output .generated-code {
      background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
      padding: 8px 12px; margin-bottom: 10px; color: #e6edf3; white-space: pre-wrap; font-size: 12px;
      position: relative;
    }
    .cell-output .generated-code::before {
      content: 'generated'; position: absolute; top: 6px; right: 8px;
      font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: 0.05em;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .cell-output .llm-note {
      color: #8b949e; font-style: italic; font-size: 11px; margin-bottom: 6px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .cell-output .llm-note::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #58a6ff; animation: pulseDot 1s ease-in-out infinite;
    }
    .cell-output .agent-summary {
      margin-top: 12px; padding: 12px 14px;
      background: linear-gradient(135deg, rgba(110, 64, 201, 0.10), rgba(88, 166, 255, 0.05));
      border-left: 3px solid #6e40c9;
      border-radius: 0 8px 8px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; line-height: 1.55; color: #d6dde6;
      position: relative;
    }
    .cell-output .agent-summary.streaming::after {
      content: ''; display: inline-block; width: 7px; height: 13px;
      background: #b084ff; margin-left: 2px; vertical-align: middle;
      animation: caretBlink 0.9s steps(2, end) infinite;
    }
    .cell-output .agent-summary strong { color: #d2a8ff; }
    .cell-output .agent-thinking {
      color: #484f58; font-size: 11px; font-style: italic; margin-top: 10px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .cell-output .agent-thinking::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #6e40c9; animation: pulseDot 1s ease-in-out infinite;
    }

    .cell-output .df-output { margin: 8px 0; overflow-x: auto; position: relative; border-radius: 6px; }
    .df-table { border-collapse: collapse; font-size: 12px; font-family: monospace; }
    .df-table th {
      background: #0d1117; color: #58a6ff; padding: 6px 12px;
      border-bottom: 1px solid #30363d; text-align: left; font-weight: 600;
      position: sticky; top: 0;
    }
    .df-table td { padding: 5px 12px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
    .df-table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
    .df-table tr:hover td { background: rgba(88,166,255,0.08); transition: background 0.1s; }
    .df-export-bar { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
    .df-export-bar button {
      padding: 3px 12px; font-size: 11px; background: #21262d; border: 1px solid #30363d;
      border-radius: 999px; color: #8b949e; cursor: pointer; font-family: monospace;
      transition: color 0.15s, border-color 0.15s, transform 0.1s;
    }
    .df-export-bar button:hover { color: #c9d1d9; border-color: #58a6ff; }
    .df-export-bar button:active { transform: scale(0.94); }
    .df-export-bar .export-label { font-size: 11px; color: #484f58; }

    #add-cell-btn {
      display: block; width: 100%; padding: 12px; background: transparent;
      border: 1px dashed #21262d; border-radius: 10px; color: #484f58; font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
    }
    #add-cell-btn:hover {
      border-color: #58a6ff; color: #58a6ff;
      background: rgba(88, 166, 255, 0.04);
    }
    #add-cell-btn:active { transform: scale(0.99); }
    .hint { text-align: center; padding: 14px; color: #30363d; font-size: 11px; }
    .hint kbd {
      background: #21262d; border: 1px solid #30363d; border-radius: 3px;
      padding: 1px 5px; font-family: monospace; font-size: 10px; color: #8b949e;
    }
    .hidden { display: none !important; }

    /* Image / chart output */
    .cell-output img { max-width: 100%; border-radius: 6px; display: block; }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <h1>pyreplab <span>notebook</span></h1>
      <span id="status" class="loading">loading...</span>
    </div>
    <div class="header-actions">
      <button id="new-btn" title="New notebook">New</button>
      <button id="save-btn" title="Save & share" class="hidden">Share</button>
      <button id="add-top-btn" title="Add cell">+ Cell</button>
    </div>
  </header>

  <!-- Landing: data picker -->
  <div id="landing">
    <h2>Choose your data</h2>
    <p class="subtitle">Pick a dataset to start exploring, or drop your own file anywhere on this page.</p>
    <div class="data-grid" id="data-grid"></div>
    <input type="file" id="file-input" accept=".csv,.json,.jsonl,.tsv,.xlsx,.xls" style="display:none">
  </div>

  <!-- Drag-drop overlay -->
  <div id="drop-overlay">
    <div class="drop-card">
      <div class="drop-title">Drop to load</div>
      <div class="drop-sub">CSV, JSON, TSV, Excel</div>
    </div>
  </div>

  <!-- Notebook: hidden until data is loaded -->
  <div id="notebook" class="hidden"></div>

  <script src="/main.js"></script>
  <script>
    // --- Curated datasets ---
    const DATASETS = {
      'Markets': [
        { title: 'NVDA', desc: 'NVIDIA', code: "df = await load_ticker('NVDA')", ask: 'what is the price trend?' },
        { title: 'AAPL', desc: 'Apple', code: "df = await load_ticker('AAPL')", ask: 'show monthly average closing price' },
        { title: 'TSLA', desc: 'Tesla', code: "df = await load_ticker('TSLA')", ask: 'what was the most volatile month?' },
        { title: 'MSFT', desc: 'Microsoft', code: "df = await load_ticker('MSFT')", ask: 'compare high vs low spread' },
        { title: 'S&P 500', desc: 'Index', code: "df = await load_ticker('^GSPC')", ask: 'what is the YTD return?' },
        { title: 'Gold', desc: 'Gold futures', code: "df = await load_ticker('GC=F')", ask: 'plot gold price over time' },
      ],
      'Crypto': [
        { title: 'BTC', desc: 'Bitcoin', code: "df = await load_ticker('BTC')", ask: 'plot the closing price' },
        { title: 'ETH', desc: 'Ethereum', code: "df = await load_ticker('ETH')", ask: 'what is the trend?' },
        { title: 'SOL', desc: 'Solana', code: "df = await load_ticker('SOL')", ask: 'how volatile is it compared to BTC?' },
        { title: 'DOGE', desc: 'Dogecoin', code: "df = await load_ticker('DOGE')", ask: 'show the biggest daily moves' },
        { title: 'XRP', desc: 'Ripple', code: "df = await load_ticker('XRP')", ask: 'what is the price range?' },
        { title: 'ADA', desc: 'Cardano', code: "df = await load_ticker('ADA-USD')", ask: 'plot the volume over time' },
      ],
      'Classic ML': [
        { title: 'Titanic', desc: 'Passenger survival data (891 rows)', code: "df = await load_url('https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv')", ask: 'what factors predicted survival?' },
        { title: 'Iris', desc: 'Flower species measurements (150 rows)', code: "df = await load_url('https://raw.githubusercontent.com/mwaskom/seaborn-data/master/iris.csv')", ask: 'how do the species differ in petal size?' },
        { title: 'Penguins', desc: 'Palmer penguins body measurements (344 rows)', code: "df = await load_url('https://raw.githubusercontent.com/mwaskom/seaborn-data/master/penguins.csv')", ask: 'compare body mass across species' },
        { title: 'MPG', desc: 'Car fuel efficiency (398 rows)', code: "df = await load_url('https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv')", ask: 'how has MPG changed over model years?' },
        { title: 'Diamonds', desc: 'Diamond prices & attributes (53,940 rows)', code: "df = await load_url('https://raw.githubusercontent.com/mwaskom/seaborn-data/master/diamonds.csv')", ask: 'what drives diamond price the most?' },
      ],
      'Real World': [

    function handleFileUpload(file) {
      if (!ready) {
        // Queue file — process when ready
        window._pendingFile = file;
        statusEl.textContent = 'loading...';
        return;
      }
      const name = file.name.replace(/[^a-zA-Z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '').toLowerCase();
      const varName = name.replace(/\.(csv|json|jsonl|tsv|xlsx|xls)$/i, '') || 'uploaded';
      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'xlsx' || ext === 'xls') {
        // Excel: read as ArrayBuffer, write to Pyodide FS, then read_excel
        const reader = new FileReader();
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          // Store bytes globally so the worker can write them to Pyodide FS
          window._pendingExcelBytes = bytes;
          window._pendingExcelName = file.name;
          const code = `${varName} = pd.read_excel("/tmp/${file.name}")\nprint(f"loaded ${varName}: {${varName}.shape[0]} rows x {${varName}.shape[1]} cols")\n${varName}.head()`;
          startNotebook(code, `describe the ${varName} data`);
        };
        reader.readAsArrayBuffer(file);
      } else {
        // Text formats: CSV, JSON, TSV — write to Pyodide FS like Excel
        const reader = new FileReader();
        reader.onload = () => {
          window._pendingFileText = reader.result;
          window._pendingFileName = file.name;
          let code;
          if (ext === 'json' || ext === 'jsonl') {
            code = `import json as _json\nwith open("/tmp/${file.name}") as _f:\n    _data = _json.loads(_f.read())\nif isinstance(_data, list):\n    ${varName} = pd.DataFrame(_data)\nelse:\n    ${varName} = pd.DataFrame([_data] if isinstance(_data, dict) else {'value': [_data]})\nprint(f"loaded ${varName}: {${varName}.shape[0]} rows x {${varName}.shape[1]} cols")\n${varName}.head()`;
          } else {
            const sep = ext === 'tsv' ? "\\\\t" : ",";
            code = `${varName} = pd.read_csv("/tmp/${file.name}", sep="${sep}")\nprint(f"loaded ${varName}: {${varName}.shape[0]} rows x {${varName}.shape[1]} cols")\n${varName}.head()`;
          }
          startNotebook(code, `describe the ${varName} data`);
        };
        reader.readAsText(file);
      }
    }

    // --- Save notebook to slug ---
    async function copyShareUrl(url) {
      try {
        await navigator.clipboard.writeText(url);
        return true;
      } catch {}

      const textarea = document.createElement('textarea');
      textarea.value = url;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      let copied = false;
      try {
        copied = document.execCommand('copy');
      } catch {}
      textarea.remove();
      return copied;
    }

    // --- Run cell ---

    function runCodeCell(cell, code, output) {
      return new Promise((resolve) => {
        const timeout = setTimeout(() => {
          showResult(output, { error: 'Execution timed out (30s)' });
          finishCell(cell);
          resolve();
        }, 35000);
        window.onPyreplabResult = function(result) {
          clearTimeout(timeout);
          showResult(output, result);
          finishCell(cell);
          resolve();
        };
        window.runInPyreplab(code);
      });
    }

    function startTicker(el, base) {
      const t0 = Date.now();
      el.textContent = base;
      const update = () => {
        const s = Math.floor((Date.now() - t0) / 1000);
        el.textContent = s >= 1 ? `${base} ${s}s` : base;
      };
      const id = setInterval(update, 250);
      return () => clearInterval(id);
    }

    async function runAskCell(cell, query, output) {
      const apiKey = (document.getElementById('openrouter-key') || {}).value || '';

      output.classList.add('has-output');
      const note = document.createElement('span');
      note.className = 'llm-note';
      output.innerHTML = '';
      output.appendChild(note);
      const stopGenTicker = startTicker(note, 'generating code…');

      const { namespace: nsSummary, recentTurns } = await fetchContextSummary();
      console.log('[ask] context:', nsSummary.length, 'ns items,', recentTurns.length, 'turns');

      try {
        const resp = await fetch('/api/openrouter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: apiKey.trim(), query, namespace: nsSummary, recentTurns })
        });
        const data = await resp.json();
        stopGenTicker();

        if (data.error) {
          showResult(output, { error: data.error });
          finishCell(cell);
          return;
        }

        const generatedCode = data.code || '';
        output.innerHTML = '';

        if (data.title) {
          const titleEl = document.createElement('span');
          titleEl.className = 'llm-note';
          titleEl.textContent = data.title;
          output.appendChild(titleEl);
        }

        const codeBlock = document.createElement('div');
        codeBlock.className = 'generated-code';
        codeBlock.textContent = generatedCode;
        output.appendChild(codeBlock);
        output.classList.add('has-output');

        const execResult = await new Promise((resolve) => {
          const timeout = setTimeout(() => {
            resolve({ error: 'Execution timed out (30s)' });
          }, 35000);
          window.onPyreplabResult = function(result) {
            clearTimeout(timeout);
            resolve(result);
          };
          window.runInPyreplab(generatedCode, true, query);
        });
        showResult(output, execResult, true);

        // Agent interpretation — summarize the results (streamed)
        const thinkingEl = document.createElement('div');
        thinkingEl.className = 'agent-thinking';
        output.appendChild(thinkingEl);
        const stopThinkTicker = startTicker(thinkingEl, 'interpreting');
        thinkingEl.dataset.stopTicker = '1';
        thinkingEl._stopTicker = stopThinkTicker;
        finishCell(cell);

        streamSummary(thinkingEl, {
          apiKey: apiKey.trim(),
          query,
          code: generatedCode,
          output: buildSummaryOutput(execResult),
          error: execResult.error || '',
        });

      } catch (err) {
        stopGenTicker();
        showResult(output, { error: err.message });
        finishCell(cell);
      }
    }

    async function streamSummary(thinkingEl, payload) {
      const stopTicker = thinkingEl._stopTicker || (() => {});
      try {
        const resp = await fetch('/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, stream: true })
        });
        if (!resp.ok || !resp.body) {
          stopTicker();
          thinkingEl.remove();
          return;
        }
        const ct = resp.headers.get('content-type') || '';
        if (!ct.includes('text/event-stream')) {
          // Fallback: server returned JSON (no api key, etc)
          const data = await resp.json().catch(() => ({}));
          stopTicker();
          if (data.summary) {
            thinkingEl.className = 'agent-summary';
            thinkingEl.textContent = data.summary;
          } else {
            thinkingEl.remove();
          }
          return;
        }
        // Switch element from thinking → streaming summary on first token
        let started = false;
        let acc = '';
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop() || '';
          for (const part of parts) {
            const line = part.split('\n').find(l => l.startsWith('data:'));
            if (!line) continue;
            const data = line.slice(5).trim();
            if (data === '[DONE]') continue;
            try {
              const { delta } = JSON.parse(data);
              if (!delta) continue;
              if (!started) {
                started = true;
                stopTicker();
                thinkingEl.className = 'agent-summary streaming';
                thinkingEl.textContent = '';
              }
              acc += delta;
              thinkingEl.textContent = acc;
            } catch {}
          }
        }
        stopTicker();
        if (!started) {
          thinkingEl.remove();
        } else {
          thinkingEl.classList.remove('streaming');
        }
      } catch {
        stopTicker();
        thinkingEl.remove();
      }
    }

    async function fetchContextSummary() {
      try {
        if (typeof window.getContext === 'function') {
          const data = await window.getContext();
          if (data && typeof data === 'object' && !Array.isArray(data)) {
            return {
              namespace: data.namespace || [],
              recentTurns: data.recentTurns || [],
            };
          }
          const parsed = JSON.parse(typeof data === 'string' ? data : String(data));
          return {
            namespace: parsed.namespace || [],
            recentTurns: parsed.recentTurns || [],
          };
        }
        const data = window._lastContext || '{"namespace":[],"recentTurns":[]}';
        const parsed = JSON.parse(typeof data === 'string' ? data : String(data));
        return {
          namespace: parsed.namespace || [],
          recentTurns: parsed.recentTurns || [],
        };
      } catch {
        return { namespace: [], recentTurns: [] };
      }
    }

    function buildSummaryOutput(execResult) {
      const parts = [];
      if (execResult.stdout) parts.push(execResult.stdout.trim());
      if (execResult.result) parts.push(String(execResult.result).trim());
      if (execResult.html) {
        const doc = new DOMParser().parseFromString(execResult.html, 'text/html');
        const text = (doc.body && doc.body.textContent) ? doc.body.textContent.replace(/\s+/g, ' ').trim() : '';
        if (text) parts.push(`table preview: ${text.slice(0, 2000)}`);
      }
      return parts.filter(Boolean).join('\n\n');
    }

    function showResult(output, result, append) {
      if (!append) output.innerHTML = '';
      output.classList.add('has-output');
      if (result.stdout) appendOutput(output, result.stdout, 'stdout');
      if (result.stderr) appendOutput(output, result.stderr, 'stderr');
      if (result.html) {
        const div = document.createElement('div');
        div.className = 'df-output';
        div.innerHTML = result.html;
        // Add export bar if it contains a table
        if (div.querySelector('.df-table')) {
          const bar = document.createElement('div');
          bar.className = 'df-export-bar';
          bar.innerHTML = '<span class="export-label">Export:</span>';
          ['CSV', 'JSON', 'Excel'].forEach(fmt => {
            const btn = document.createElement('button');
            btn.textContent = fmt;
            btn.addEventListener('click', () => exportTable(div.querySelector('.df-table'), fmt));
            bar.appendChild(btn);
          });
          div.appendChild(bar);
        }
        output.appendChild(div);
      }
      if (result.result) appendOutput(output, result.result, 'result');
      if (result.error) appendOutput(output, result.error, 'error');
    }

    function exportTable(table, format) {
      // Parse HTML table to array of objects
      const headers = Array.from(table.querySelectorAll('th')).map(th => th.textContent.trim());
      const rows = [];
      table.querySelectorAll('tbody tr').forEach(tr => {
        const row = {};
        tr.querySelectorAll('td').forEach((td, i) => {
          if (i < headers.length) row[headers[i]] = td.textContent.trim();
        });
        rows.push(row);
      });

      let content, mime, ext;
      if (format === 'CSV') {
        const csvRows = [headers.join(',')];
        rows.forEach(row => {
          csvRows.push(headers.map(h => {
            const v = row[h] || '';
            return v.includes(',') || v.includes('"') || v.includes('\n') ? '"' + v.replace(/"/g, '""') + '"' : v;
          }).join(','));
        });
        content = csvRows.join('\n');
        mime = 'text/csv';
        ext = 'csv';
      } else if (format === 'JSON') {
        content = JSON.stringify(rows, null, 2);
        mime = 'application/json';
        ext = 'json';
      } else if (format === 'Excel') {
        // Generate CSV for Excel (opens in Excel natively)
        const csvRows = [headers.join('\t')];
        rows.forEach(row => {
          csvRows.push(headers.map(h => row[h] || '').join('\t'));
        });
        content = csvRows.join('\n');
        mime = 'text/tab-separated-values';
        ext = 'tsv';
      }

      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `data.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function appendOutput(parent, text, cls) {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text;
      parent.appendChild(span);
    }

    function finishCell(cell) {
      cell.classList.remove('running');
      runningCell = null;
      statusEl.textContent = 'idle';
      statusEl.className = 'idle';

      const cells = Array.from(notebook.querySelectorAll('.cell'));
      const idx = cells.indexOf(cell);
      if (idx >= 0 && idx < cells.length - 1) {
        const next = cells[idx + 1];
        next.querySelector('.cell-input').focus();
      } else {
        const newCell = addCell('ask');
        newCell.querySelector('.cell-input').focus();
      }
    }

    // --- Worker ready ---
    window.onPyreplabReady = function() {
      ready = true;
      statusEl.textContent = 'idle';
      statusEl.className = 'idle';
      // If user clicked a dataset while loading, start now
      if (window._pendingStart) {
        const { code, ask } = window._pendingStart;
        window._pendingStart = null;
        startNotebook(code, ask);
      } else if (window._pendingFile) {
        const f = window._pendingFile;
        window._pendingFile = null;
        handleFileUpload(f);
      } else if (window._pendingSlug) {
        const session = window._pendingSlug;
        window._pendingSlug = null;
        loadFromSlug(session);
      }
    };

    // --- Load from slug URL on page load ---
    (async function() {
      const match = location.pathname.match(/^\/s\/([a-f0-9]+)$/);
      if (!match) return;
      try {
        const resp = await fetch(`/api/load/${match[1]}`);
        if (!resp.ok) return;
        const session = await resp.json();
        loadFromSlug(session);
        if (!ready) {
          statusEl.textContent = 'loading...';
          statusEl.className = 'loading';
        }
      } catch {}
    })();
  </script>
</body>
</html>
